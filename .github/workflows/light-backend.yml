name: Light Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'light/backend/**'
      - '.github/workflows/light-backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'light/backend/**'
      - '.github/workflows/light-backend.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test Light Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'light/backend/requirements.txt'

      - name: Install dependencies
        working-directory: ./light/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run light backend tests
        working-directory: ./light/backend
        env:
          DATABASE_URL: sqlite:///./light_erp_ci.db
        run: |
          pytest -v tests --tb=short
